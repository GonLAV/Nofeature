name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warroom_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Build TypeScript
        working-directory: apps/api
        run: npm run build

      - name: Run unit tests
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warroom_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-32chars-long-xx
          JWT_REFRESH_SECRET: test-refresh-secret-32chars-long-x
          ENCRYPTION_KEY: test-encryption-key-32chars-longx
          ANTHROPIC_API_KEY: sk-ant-test
        run: npm run test:unit

      - name: Run integration tests
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warroom_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-32chars-long-xx
          JWT_REFRESH_SECRET: test-refresh-secret-32chars-long-x
          ENCRYPTION_KEY: test-encryption-key-32chars-longx
          ANTHROPIC_API_KEY: sk-ant-test
        run: npm run test:integration

  build-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: test-api

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t war-room-api apps/api

  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build
        working-directory: apps/web
        env:
          VITE_API_URL: http://localhost:4000
        run: npm run build

  build-web-docker:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t war-room-web apps/web
